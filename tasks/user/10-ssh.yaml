- name: Start from scratch
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop:
    - { path: "{{ home }}/.ssh/config" }
    - { path: "{{ home }}/.ssh/authorized_keys" }
  loop_control:
    label: "Removing {{ item.path }}"

- name: Set authorized keys
  ansible.posix.authorized_key:
    user: "{{ user }}"
    state: present
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC51mjYY4hREMoR2CzQQ/jRLYWxLk+T4so+5U2YNlYf0 shubms@local"

- name: Add Global settings in the configuration
  community.general.ssh_config:
    add_keys_to_agent: true
    controlmaster: "auto"
    controlpersist: 600
    host: "*"
    host_key_algorithms: "ssh-ed25519-cert-v01@openssh.com,ssh-rsa-cert-v01@openssh.com,ssh-ed25519,ssh-rsa"
    state: present
    strict_host_key_checking: "accept-new"
    user: "{{ user }}"
    other_options:
      ciphers: "chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
      hashknownhosts: "yes"
      kexalgorithms: "curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256"
      macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-512,hmac-sha2-256,umac-128@openssh.com"

- name: Add Hetnzer in the configuration
  community.general.ssh_config:
    host: "leorio"
    hostname: "{{ host }}.your-storagebox.de"
    port: "23"
    remote_user: "{{ host }}"
    state: present
    user: "{{ user }}"
    other_options:
      serveraliveinterval: "60"
      serveralivecountmax: "240"
  vars:
    host: "u571602"
